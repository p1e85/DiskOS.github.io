<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>testing DiskOS V1.8</title>
    <link rel="stylesheet" href="testmodules/os_styles.css">
</head>
<body>

    <div id="monitor">
        <!-- Added inline CSS to make the input hidden but still focusable for mobile -->
        <textarea id="mobile-keyboard" style="position: absolute; opacity: 0; z-index: -1; pointer-events: none;" autocorrect="off" autocapitalize="none" spellcheck="false" autocomplete="off"></textarea>
        
        <canvas id="screen" width="1280" height="640"></canvas>
        <div class="scanlines"></div>
        <div class="glass-glare"></div>
    </div>

    <div id="gamepad">
        <div id="pad-left" class="pad-section"></div>
        <div id="pad-right" class="pad-section"></div>
    </div>

<!-- Order matters! Load Memory, Display, Audio, CPU first -->
<script type="module" src="testmodules/os_memory.js"></script>
<script type="module" src="testmodules/os_audio.js"></script>
<script type="module" src="testmodules/os_display.js"></script>
<script type="module" src="testmodules/os_cpu.js"></script>
<script type="module" src="testmodules/os_terminal.js"></script>

<!-- Added your new Studio module to the stack -->
<script type="module" src="testmodules/os_studio.js"></script>

<!-- The Parser Motherboard links them all -->
<script type="module" src="testmodules/os_parser.js"></script>

<!-- The Kernel and UI depend on the Parser -->
<script type="module" src="testmodules/os_kernel.js"></script>
<script type="module" src="testmodules/os_ui.js"></script>

</body>
</html>
